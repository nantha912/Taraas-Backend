spring.application.name=lsp
spring.data.mongodb.database=Local_services

server.port=5000
logging.level.org.springframework.data.mongodb.core.MongoTemplate=ERROR
spring.profiles.include=secrets

# AWS S3 Configuration

aws.s3.region=us-east-1
aws.s3.bucket-name=lsb-provider-photos

# Multipart File Upload Limits
# These ensure the server can handle the photo uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# --- EMAIL CONFIGURATION (BREVO SMTP) ---
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=false

# --- JWT CONFIGURATION ---
# Token expiration in milliseconds (24 hours)
jwt.expiration=86400000
# Refresh token expiration in milliseconds (7 days)
jwt.refreshExpiration=604800000

taraas.allowed-origins=http://localhost:3000,http://localhost:5173
