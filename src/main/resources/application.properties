spring.application.name=lsp
spring.data.mongodb.database=Local_services

server.port=5000
logging.level.org.springframework.data.mongodb.core.MongoTemplate=ERROR
spring.profiles.include=secrets

# AWS S3 Configuration

aws.s3.region=us-east-1
aws.s3.bucket-name=lsb-provider-photos

# Multipart File Upload Limits
# These ensure the server can handle the photo uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# --- EMAIL CONFIGURATION (BREVO SMTP) ---
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=false

# --- JWT CONFIGURATION ---
# Token expiration in milliseconds (24 hours)
jwt.expiration=86400000
# Refresh token expiration in milliseconds (7 days)
jwt.refreshExpiration=604800000
# JWT Secret Key - CHANGE IN PRODUCTION! Use a strong random string of at least 256 bits
jwt.secret=this-is-a-very-long-secret-key-that-is-at-least-64-bytes-long-to-satisfy-hs512-requirements-1234567890

# --- HTTPS/SSL CONFIGURATION ---
# Uncomment these in production when you have an SSL certificate
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=your-keystore-password
# server.ssl.key-store-type=PKCS12
# server.ssl.key-alias=tomcat
# Redirect HTTP to HTTPS
# server.http2.enabled=true
# security.require-https=true